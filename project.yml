# XcodeGen project configuration for Doomnite
# This generates the Xcode project from this YAML file

name: Doomnite
options:
  bundleIdPrefix: com.doomnite
  deploymentTarget:
    iOS: "17.0"
  swiftVersion: "5.9"
  xcodeVersion: "15.0"
  carthage: false
  createIntermediateGroups: true

packages:
  # No external SPM packages needed - using built-in frameworks
  # MetalKit, ModelIO, GameController, AVFoundation, Network are all built-in

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
    DEAD_CODE_STRIPPING: "YES"
    SKIP_INSTALL: "NO"
    # Optimization settings
    SWIFT_COMPILATION_MODE: "wholemodule"
    GCC_OPTIMIZATION_LEVEL: "3"
    # Metal settings
    MTL_ENABLE_DEBUG_INFO: "NO"
    MTL_FAST_MATH_ENABLED: "YES"
    # Code signing (adjust for your team)
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: ""
    # Performance settings
    VALID_ARCHS: "arm64"
    ARCHS: "arm64"
    ONLY_ACTIVE_ARCH: "NO"

targets:
  Doomnite:
    type: application
    platform: iOS
    sources:
      - path: Sources/Doomnite
        includes:
          - "**/*.swift"
        excludes:
          - "**/Tests/**"
      - path: Sources/Game
        includes:
          - "**/*.swift"
          - "**/*.mm"
        excludes:
          - "**/Tests/**"
    settings:
      base:
        INFOPLIST_FILE: "Sources/Doomnite/Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: "com.doomnite.app"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        GENERATE_INFOPLIST_FILE: "NO"
        # Orientation settings
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationMaskLandscape"
        SUPPORTED_INTERFACE_ORIENTATIONS_IPAD: "UIInterfaceOrientationMaskLandscape"
        # Performance
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "RELEASE=1"
        # C++/ObjC++ settings
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        GCC_C_LANGUAGE_STANDARD: "c11"
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: DoomniteEngine
      - target: DoomniteShared
    preBuildScripts:
      - script: |
          echo "Building Doomnite..."
          # Ensure Metal shader compilation
        name: "Pre-build Setup"
    
  DoomniteEngine:
    type: framework
    platform: iOS
    sources:
      - path: Sources/DoomniteEngine
        includes:
          - "**/*.cpp"
          - "**/*.hpp"
          - "**/*.h"
          - "**/*.mm"
        excludes:
          - "**/Tests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.doomnite.engine"
        DEFINES_MODULE: "YES"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "ENGINE=1"
        # C++/ObjC++ settings for engine core
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        GCC_C_LANGUAGE_STANDARD: "c11"
        CLANG_ENABLE_MODULES: "YES"
    dependencies:
      - target: DoomniteShared
    frameworks:
      - Metal
      - MetalKit
      - ModelIO
      - GameController
      - AVFoundation
      - Network
      - simd
      - Foundation
      - CoreGraphics
      - UIKit
    
  DoomniteShared:
    type: framework
    platform: iOS
    sources:
      - path: Sources/DoomniteShared
        includes:
          - "**/*.cpp"
          - "**/*.hpp"
          - "**/*.h"
        excludes:
          - "**/Tests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.doomnite.shared"
        DEFINES_MODULE: "YES"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    frameworks:
      - Foundation
      - simd

# File groups for organization (not targets)
fileGroups:
  - path: Resources
    name: Resources
    children:
      - path: Assets.xcassets
      - path: Models
      - path: Shaders
      - path: Audio
      - path: Data
  - path: Documentation
    name: Documentation
  - path: Scripts
    name: Scripts
